<h2>Manajemen User (Single Page)</h2>

<div style="border: 1px solid #ccc; padding: 15px; margin-bottom: 20px;">
    <h3>Tambah User Baru</h3>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Simpan User</button>
    </form>
</div>

<hr>

<h3>Daftar Pengguna</h3>
<table border="1" cellpadding="10">
    <thead>
        <tr>
            <th>Username</th>
            <th>Aksi</th>
        </tr>
    </thead>
    <tbody>
        {% for user in semua_user %}
        <tr>
            <td>{{ user.username }}</td>
            <td>
                <form action="{% url 'user_delete_action' user.pk %}" method="post" style="display:inline;">
                    {% csrf_token %}
                    <button type="submit" onclick="return confirm('Yakin hapus?')">Hapus</button>
                </form>
            </td>
        </tr>
        {% empty %}
        <tr><td colspan="2">Belum ada data.</td></tr>
        {% endfor %}
    </tbody>
</table>
